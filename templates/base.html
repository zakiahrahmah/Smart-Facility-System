<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Facility Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ================= GLOBAL ================= */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f4f7fe;
}

/* ================= SIDEBAR (SAMA STYLE ADMIN) ================= */
.sidebar-modern{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:linear-gradient(180deg,#0e3040,#13275f);
    color:white;
    padding:22px;
    box-shadow:4px 0 25px rgba(0,0,0,0.15);
    overflow-y:auto;
}

/* LOGO */
.sidebar-modern .brand{
    font-size:22px;
    font-weight:700;
    margin-bottom:40px;
}

/* MENU */
.sidebar-modern a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 16px;
    color:#e2e8f0;
    text-decoration:none;
    border-radius:14px;
    margin-bottom:10px;
    transition:0.3s;
    font-weight:500;
}

.sidebar-modern a:hover{
    background:#07212c;
    transform:translateX(4px);
}

/* ACTIVE */
.sidebar-modern a.active{
    background:linear-gradient(135deg,#3283a6,#162d5f);
    color:white;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:0;
    left:260px;
    right:0;
    height:70px;
    background:linear-gradient(135deg,#0e3040,#13275f);
    color:white;
    display:flex;
    align-items:center;
    padding:0 20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

/* ================= MAIN ================= */
.main-content{
    margin-left:260px;
    margin-top:70px;
    padding:25px;
    min-height:100vh;
}

/* ================= CARD ================= */
.card{
    border:none;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* ================= FOOTER ================= */
footer{
    text-align:center;
    padding:15px;
    background:linear-gradient(135deg,#0e3040,#13275f);
    color:white;
    margin-top:30px;
}

/* ================= RESPONSIVE ================= */
@media(max-width:992px){

    .sidebar-modern{
        transform:translateX(-100%);
        transition:0.3s;
        position:fixed;
        z-index:999;
    }

    .sidebar-modern.active{
        transform:translateX(0);
    }

    .main-content{
        margin-left:0;
        padding:15px;
    }

    .navbar{
        left:0;
        width:100%;
    }

    .menu-toggle{
        display:block;
        position:fixed;
        top:15px;
        left:15px;
        z-index:1000;
        background:#13275f;
        color:white;
        border:none;
        width:45px;
        height:45px;
        border-radius:10px;
    }
}

</style>

{% block extra_css %}{% endblock %}
</head>

<body>

<!-- TOGGLE MOBILE -->
<button class="menu-toggle d-lg-none" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</button>

<!-- SIDEBAR USER (TETAP MENU ASLI KAMU) -->
<div class="sidebar-modern">

    <div class="brand">
        Smart Facility Booking
    </div>

    <a href="{{ url_for('dashboard') }}">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="{{ url_for('fasilitas') }}">
        <i class="fas fa-building"></i> Fasilitas
    </a>

    <a href="{{ url_for('booking') }}">
        <i class="fas fa-calendar-check"></i> Booking
    </a>

    <a href="{{ url_for('riwayat_user') }}">
        <i class="fas fa-history"></i> Riwayat
    </a>

    <a href="{{ url_for('logout') }}">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>

</div>

<!-- NAVBAR -->
<div class="navbar">
    <div class="ms-auto">
        <i class="fas fa-user-circle"></i>
        {{ current_user.nama_lengkap }}
    </div>
</div>

<!-- MAIN -->
<div class="main-content">

    {% block content %}{% endblock %}

    <footer>
        © 2026 Smart Facility Booking System
    </footer>

</div>

<script>
function toggleSidebar(){
    document.querySelector('.sidebar-modern').classList.toggle('active');
}
</script>

</body>
</html>
