<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
        margin:0;
        background:#f4f7fe;
        font-family:'Segoe UI',sans-serif;
    }

    /* SIDEBAR */
    .sidebar{
        position:fixed;
        left:0;
        top:0;
        width:260px;
        height:100vh;
        background:linear-gradient(180deg,#081c3a,#0f2f5a,#08142b);
        color:white;
        padding:20px;
        z-index:100;
    }

    .logo{
        font-size:26px;
        font-weight:bold;
        margin-bottom:40px;
    }

    .sidebar a{
        display:block;
        color:#cbd5e1;
        text-decoration:none;
        padding:14px;
        border-radius:12px;
        margin-bottom:8px;
        transition:.3s;
    }

    .sidebar a:hover,
    .sidebar a.active{
        background:rgba(255,255,255,0.1);
        color:white;
    }

    /* MAIN */
    .main{
        margin-left:260px;
        padding:25px;
    }

    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        Smart Facility Booking System
    </div>

    <a href="{{ url_for('admin_dashboard') }}">
        Dashboard
    </a>

    <a href="{{ url_for('admin_peminjaman') }}">
        Data Peminjaman
    </a>

    <a href="{{ url_for('admin_fasilitas') }}">
        Data Fasilitas
    </a>

    <a href="{{ url_for('admin_user') }}">
        Data Pengguna
    </a>

    <a href="{{ url_for('laporan_admin') }}">
        Laporan
    </a>

    <a href="{{ url_for('logout') }}">
        Logout
    </a>

</div>

<!-- MAIN -->
<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
