<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>

body{
    margin:0;
    background:#f4f7fe;
    font-family:'Segoe UI',sans-serif;
}

/* ===== SIDEBAR (DISAMAKAN DENGAN USER THEME) ===== */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background: linear-gradient(180deg,#0e3040,#13275f);
    color:white;
    padding:22px;
    box-shadow: 4px 0 25px rgba(0,0,0,0.15);
    z-index:100;
}

/* LOGO */
.logo{
    font-size:24px;
    font-weight:700;
    margin-bottom:40px;
    color:white;
}

/* LINK */
.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 16px;
    color:#e2e8f0;
    text-decoration:none;
    border-radius:14px;
    margin-bottom:10px;
    transition:0.3s;
    font-weight:500;
}

/* HOVER (SAMA DENGAN USER) */
.sidebar a:hover{
    background:#07212c;
    color:white;
    transform:translateX(4px);
}

/* ACTIVE MENU */
.sidebar a.active{
    background: linear-gradient(135deg,#3283a6,#162d5f);
    color:white;
    box-shadow: 0 8px 20px rgba(56,189,248,0.35);
}

/* MAIN AREA */
.main{
    margin-left:260px;
    padding:25px;
}

/* RESPONSIVE */
@media(max-width:992px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
        padding:20px;
    }
}

</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        Smart Facility Booking System
    </div>

    <a href="{{ url_for('admin_dashboard') }}">
        <i class="fas fa-home"></i>
        Dashboard
    </a>

    <a href="{{ url_for('admin_peminjaman') }}">
         <i class="fas fa-hand-holding"></i>
        Data Peminjaman
    </a>

    <a href="{{ url_for('admin_fasilitas') }}">
        <i class="fas fa-building"></i>
        Data Fasilitas
    </a>

    <a href="{{ url_for('admin_user') }}">
        <i class="fas fa-users"></i>
        Data Pengguna
    </a>
    
    <a href="{{ url_for('pengembalian_list') }}">
          <i class="fas fa-undo"></i>
        Pengembalian
     </a>

    <a href="{{ url_for('laporan_admin') }}">
        <i class="fas fa-file-alt"></i>
        Laporan
    </a>

    <a href="{{ url_for('logout') }}">
        <i class="fas fa-sign-out-alt"></i>
        Logout
    </a>

</div>

<!-- MAIN -->
<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
