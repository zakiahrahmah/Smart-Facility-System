{% extends "base.html" %}

{% block content %}

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
}

body{
    min-height: 100vh;

    /* BACKGROUND GAMBAR */
    background:
        linear-gradient(rgba(15,23,42,0.75), rgba(30,58,138,0.75)),
        url("https://tse2.mm.bing.net/th/id/OIP.mHcHdY4y5lYSolRrh2zd4AHaCv?rs=1&pid=ImgDetMain&o=7&rm=3");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* CARD LOGIN */
.login-card{
    border: none;
    border-radius: 24px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transition: 0.3s;
}

.login-card:hover{
    transform: translateY(-5px);
}

/* HEADER */
.login-header{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    color: white;
    padding: 25px;
    text-align: center;
}

/* INPUT */
.form-control{
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #dbeafe;
}

.form-control:focus{
    border-color: #2563eb;
    box-shadow: 0 0 0 0.2rem rgba(37,99,235,0.2);
}

/* BUTTON */
.btn-login{
    background: linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-login:hover{
    transform: scale(1.03);
    background: linear-gradient(135deg,#0ea5e9,#2563eb,#1e3a8a);
}

/* LINK */
a{
    color: #2563eb;
    font-weight: 500;
    text-decoration: none;
}

a:hover{
    text-decoration: underline;
}

</style>

<div class="container-fluid p-0">

    <div class="d-flex justify-content-center align-items-center"
         style="min-height: 100vh;">

        <div class="col-11 col-sm-8 col-md-5 col-lg-4">

            <div class="card login-card shadow-lg border-0 rounded-4">

    
                <!-- HEADER -->
                <div class="login-header">

                    <h3 class="mb-0">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </h3>

                    <small>Welcome back 👋</small>

                </div>

                <!-- BODY -->
                <div class="card-body p-4">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="username"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-login w-100 text-white">

                            <i class="fas fa-key"></i>
                            Login

                        </button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">

                        Belum punya akun?

                        <a href="{{ url_for('register') }}">
                            Daftar di sini
                        </a>

                    </p>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
