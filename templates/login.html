{% extends "base.html" %}

{% block content %}

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
    min-height: 100vh;
}

/* CARD LOGIN */
.login-card{
    border: none;
    border-radius: 24px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transition: 0.3s;
}

.login-card:hover{
    transform: translateY(-5px);
}

/* HEADER */
.login-header{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    color: white;
    padding: 25px;
    text-align: center;
}

/* INPUT */
.form-control{
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #dbeafe;
}

.form-control:focus{
    border-color: #2563eb;
    box-shadow: 0 0 0 0.2rem rgba(37,99,235,0.2);
}

/* BUTTON */
.btn-login{
    background: linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-login:hover{
    transform: scale(1.03);
    background: linear-gradient(135deg,#0ea5e9,#2563eb,#1e3a8a);
}

/* LINK */
a{
    color: #2563eb;
    font-weight: 500;
    text-decoration: none;
}

a:hover{
    text-decoration: underline;
}

</style>

<div class="row justify-content-center align-items-center" style="min-height:100vh;">
    <div class="col-md-5">

        <div class="card login-card">

            <!-- HEADER -->
            <div class="login-header">
                <h3 class="mb-0">
                    <i class="fas fa-sign-in-alt"></i> Login
                </h3>
                <small>Welcome back 👋</small>
            </div>

            <!-- BODY -->
            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-login w-100 text-white">
                        <i class="fas fa-key"></i> Login
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Belum punya akun?
                    <a href="{{ url_for('register') }}">Daftar di sini</a>
                </p>

            </div>
        </div>

    </div>
</div>

{% endblock %}
