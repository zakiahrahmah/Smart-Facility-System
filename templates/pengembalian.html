{% extends "base.html" %}

{% block content %}

<div class="page-wrapper">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">

                <!-- HEADER -->
                <div class="card-header bg-success text-white p-4">

                    <h3 class="mb-0">
                        <i class="fas fa-undo"></i>
                        Form Pengembalian
                    </h3>

                </div>

                <!-- BODY -->
                <div class="card-body p-4">

                    <form method="POST"
                          enctype="multipart/form-data">

                        <!-- ID PEMINJAMAN -->
                        <div class="mb-3">

                            <label class="form-label">
                                ID Peminjaman
                            </label>

                            <input type="text"
                                   class="form-control"
                                   value="{{ peminjaman[0] }}"
                                   readonly>

                        </div>

                        <!-- NAMA FASILITAS -->
                        <div class="mb-3">

                            <label class="form-label">
                                Nama Fasilitas
                            </label>

                            <input type="text"
                                   class="form-control"
                                   value="{{ peminjaman[1] }}"
                                   readonly>

                        </div>

                        <!-- TANGGAL -->
                        <div class="mb-3">

                            <label class="form-label">
                                Tanggal Pengembalian
                            </label>

                            <input type="datetime-local"
                                   class="form-control"
                                   name="tanggal_pengembalian"
                                   required>

                        </div>

                        <!-- KONDISI -->
                        <div class="mb-3">

                            <label class="form-label">
                                Kondisi Fasilitas
                            </label>

                            <select class="form-select"
                                    name="kondisi_fasilitas"
                                    required>

                                <option value="Baik">
                                    Baik
                                </option>

                                <option value="Rusak Ringan">
                                    Rusak Ringan
                                </option>

                                <option value="Rusak Berat">
                                    Rusak Berat
                                </option>

                            </select>

                        </div>

                        <!-- CATATAN -->
                        <div class="mb-3">

                            <label class="form-label">
                                Catatan Pengembalian
                            </label>

                            <textarea class="form-control"
                                      name="catatan_pengembalian"
                                      rows="4"></textarea>

                        </div>

                        <!-- FOTO -->
                        <div class="mb-3">

                            <label class="form-label">
                                Upload Foto
                            </label>

                            <input type="file"
                                   class="form-control"
                                   name="foto_pengembalian">
                        </div>

                        <!-- STATUS -->
                        <div class="mb-3">

                            <label class="form-label">
                                Status Pengembalian
                            </label>

                            <select class="form-select"
                                    name="status_pengembalian">

                                <option value="Menunggu Verifikasi">
                                    Menunggu Verifikasi
                                </option>

                                <option value="Sudah Dikembalikan">
                                    Sudah Dikembalikan
                                </option>

                            </select>

                        </div>

                        <!-- BUTTON -->
                        <button type="submit"
                                class="btn btn-success w-100">

                            <i class="fas fa-check-circle"></i>
                            Submit Pengembalian

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
