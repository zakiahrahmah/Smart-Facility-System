{% extends "base.html" %}

{% block content %}

<style>
body {
    background: #f1f5f9;
}

.card {
    border-radius: 20px;
}

/* CARD STYLE SAMA LOGIN */
.card-pengembalian{
    border: none;
    border-radius: 24px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.92);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* HEADER */
.header-blue{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    color: white;
    padding: 25px;
    text-align: center;
}

/* INPUT */
.form-control,
.form-select{
    border-radius: 12px;
    padding: 12px;
}

/* BUTTON */
.btn-blue{
    background: linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
    border: none;
    border-radius: 12px;
    padding: 12px;
    color: white;
    font-weight: 600;
}

.btn-blue:hover{
    transform: scale(1.03);
}

</style>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height:100vh;">

    <div class="col-md-6">

        <div class="card card-pengembalian">

            <!-- HEADER -->
            <div class="header-blue">

                <h3 class="mb-0">
                    <i class="fas fa-undo"></i>
                    Form Pengembalian
                </h3>

            </div>

            <!-- BODY -->
            <div class="card-body p-4">

                <form method="POST" enctype="multipart/form-data">

                    <!-- ID (READ ONLY) -->
                    <div class="mb-3">

                        <label>ID Peminjaman</label>

                        <input type="text"
                               class="form-control"
                               value="{{ peminjaman.id }}"
                               readonly>

                    </div>

                    <!-- NAMA FASILITAS (READ ONLY) -->
                    <div class="mb-3">

                        <label>Nama Fasilitas</label>

                        <input type="text"
                               class="form-control"
                               value="{{ peminjaman.nama_fasilitas }}"
                               readonly>

                    </div>

                    <!-- TANGGAL -->
                    <div class="mb-3">

                        <label>Tanggal Pengembalian</label>

                        <input type="datetime-local"
                               class="form-control"
                               name="tanggal_pengembalian"
                               required>

                    </div>

                    <!-- KONDISI -->
                    <div class="mb-3">

                        <label>Kondisi</label>

                        <select class="form-select"
                                name="kondisi_fasilitas">

                            <option>Baik</option>
                            <option>Rusak Ringan</option>
                            <option>Rusak Berat</option>

                        </select>

                    </div>

                    <!-- CATATAN -->
                    <div class="mb-3">

                        <label>Catatan</label>

                        <textarea class="form-control"
                                  name="catatan_pengembalian"></textarea>

                    </div>

                    <!-- FOTO -->
                    <div class="mb-3">

                        <label>Upload Foto</label>

                        <input type="file"
                               class="form-control"
                               name="foto_pengembalian">

                    </div>

                    <!-- STATUS -->
                    <div class="mb-3">

                        <label>Status</label>

                        <select class="form-select"
                                name="status_pengembalian">

                            <option>Menunggu Verifikasi</option>
                            <option>Sudah Dikembalikan</option>

                        </select>

                    </div>

                    <button class="btn btn-blue w-100">
                        Submit Pengembalian
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
