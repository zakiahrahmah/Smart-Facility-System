{% extends "base_admin.html" %}

{% block content %}

<style>

.page-top{
    margin-bottom:25px;
}

.title{
    font-size:34px;
    font-weight:700;
    color:#0f172a;
}

.subtitle{
    color:#64748b;
}

/* CARD */
.table-card{
    background:white;
    border-radius:24px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

/* TABLE */
.table thead{
    background:#f8fafc;
}

.table th{
    padding:16px;
    border:none;
    color:#334155;
}

.table td{
    padding:18px 16px;
    vertical-align:middle;
}

/* ROLE BADGE */
.role-badge{
    background:#dbeafe;
    color:#1d4ed8;
    padding:7px 14px;
    border-radius:12px;
    font-size:13px;
    font-weight:600;
}

</style>

<div class="page-top">

    <h1 class="title">
        Data Pengguna
    </h1>

    <p class="subtitle">
        Kelola seluruh pengguna sistem booking.
    </p>

</div>

<div class="table-card">

    <table class="table align-middle">

        <thead>

            <tr>
                <th>No</th>
                <th>Username</th>
                <th>Nama Lengkap</th>
                <th>Role</th>
            </tr>

        </thead>

        <tbody>

            {% for u in users %}

            <tr>

                <td>
                    {{ loop.index }}
                </td>

                <td>
                    <strong>
                        {{ u.username }}
                    </strong>
                </td>

                <td>
                    {{ u.nama_lengkap }}
                </td>

                <td>

                    <span class="role-badge">
                        {{ u.role }}
                    </span>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
