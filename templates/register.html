<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family: Arial, sans-serif;

            background:
                linear-gradient(rgba(15,23,42,0.78),
                rgba(30,58,138,0.78)),

                url("https://tse2.mm.bing.net/th/id/OIP.mHcHdY4y5lYSolRrh2zd4AHaCv?rs=1&pid=ImgDetMain&o=7&rm=3");

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            background-attachment:fixed;

            overflow:hidden;
        }

        /* REGISTER CARD */
        .register-card{

            width:100%;
            max-width:440px;

            border:none;
            border-radius:24px;

            background:rgba(255,255,255,0.14);

            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);

            box-shadow:0 15px 40px rgba(0,0,0,0.3);

            overflow:hidden;

            animation:fadeIn 0.8s ease;
        }

        /* ANIMATION */
        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        /* HEADER */
        .register-header{

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #2563eb
            );

            color:white;

            text-align:center;

            padding:28px;
        }

        .register-header h3{
            font-weight:700;
        }

        .register-header small{
            opacity:0.9;
        }

        /* BODY */
        .register-body{
            padding:30px;
            background:white;
        }

        /* LABEL */
        .form-label{
            font-weight:600;
            color:#1e293b;
            margin-bottom:6px;
        }

        /* INPUT */
        .form-control{

            border-radius:14px;

            padding:12px;

            border:1px solid #dbeafe;

            transition:0.3s;
        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:
                0 0 0 0.2rem rgba(37,99,235,0.2);

        }

        /* BUTTON */
        .btn-register{

            background:linear-gradient(
                135deg,
                #1e3a8a,
                #2563eb,
                #0ea5e9
            );

            border:none;

            border-radius:14px;

            padding:12px;

            font-weight:600;

            color:white;

            transition:0.3s;
        }

        .btn-register:hover{

            transform:translateY(-2px);

            background:linear-gradient(
                135deg,
                #0ea5e9,
                #2563eb,
                #1e3a8a
            );

        }

        /* LINK */
        a{
            text-decoration:none;
            font-weight:600;
            color:#2563eb;
        }

        a:hover{
            text-decoration:underline;
        }

        /* SMALL TEXT */
        .text-muted{
            font-size:13px;
        }

        /* MOBILE */
        @media(max-width:576px){

            .register-card{
                margin:20px;
            }

        }

    </style>

</head>

<body>

    <div class="register-card">

        <!-- HEADER -->
        <div class="register-header">

            <h3>
                <i class="fas fa-user-plus"></i>
                Registrasi
            </h3>

            <small>
                Buat akun baru untuk menggunakan sistem
            </small>

        </div>

        <!-- BODY -->
        <div class="register-body">

            <form method="POST">

                <!-- NAMA -->
                <div class="mb-3">

                    <label class="form-label">
                        Nama Lengkap
                    </label>

                    <input type="text"
                           name="nama_lengkap"
                           class="form-control"
                           placeholder="Masukkan nama lengkap"
                           required>

                </div>

                <!-- USERNAME -->
                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Masukkan username"
                           required>

                    <small class="text-muted">
                        Username digunakan saat login
                    </small>

                </div>

                <!-- EMAIL -->
                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Masukkan email"
                           required>

                </div>

                <!-- PASSWORD -->
                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Masukkan password"
                           required>

                </div>

                <!-- BUTTON -->
                <button type="submit"
                        class="btn btn-register w-100">

                    <i class="fas fa-check-circle"></i>
                    Daftar

                </button>

            </form>

            <hr>

            <!-- LOGIN -->
            <p class="text-center mb-0">

                Sudah punya akun?

                <a href="{{ url_for('login') }}">
                    Login di sini
                </a>

            </p>

        </div>

    </div>

</body>
</html>
