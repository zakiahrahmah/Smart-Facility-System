{% extends "base.html" %}

{% block content %}

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
    min-height: 100vh;
}

/* REGISTER CARD */
.register-card{
    border: none;
    border-radius: 24px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.92);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transition: 0.3s;
}

.register-card:hover{
    transform: translateY(-5px);
}

/* HEADER */
.register-header{
    background: linear-gradient(135deg,#0ea5e9,#1e3a8a,#1e40af);
    color: white;
    padding: 25px;
    text-align: center;
}

/* INPUT */
.form-control{
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #dbeafe;
}

.form-control:focus{
    border-color: #0ea5e9;
    box-shadow: 0 0 0 0.2rem rgba(14,165,233,0.2);
}

/* BUTTON */
.btn-register{
    background: linear-gradient(135deg,#0ea5e9,#2563eb,#1e3a8a);
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-register:hover{
    transform: scale(1.03);
    background: linear-gradient(135deg,#1e3a8a,#2563eb,#0ea5e9);
}

/* LINK */
a{
    color: #2563eb;
    font-weight: 500;
    text-decoration: none;
}

a:hover{
    text-decoration: underline;
}

</style>

<div class="row justify-content-center align-items-center" style="min-height:100vh;">
    <div class="col-md-6">

        <div class="card register-card">

            <!-- HEADER -->
            <div class="register-header">
                <h3 class="mb-0">
                    <i class="fas fa-user-plus"></i> Registrasi Akun
                </h3>
                <small>Buat akun baru untuk mulai menggunakan sistem</small>
            </div>

            <!-- BODY -->
            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" name="nama_lengkap" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required>
                        <small class="text-muted">Digunakan untuk login</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-register w-100 text-white">
                        <i class="fas fa-check-circle"></i> Daftar
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">
                    Sudah punya akun?
                    <a href="{{ url_for('login') }}">Login di sini</a>
                </p>

            </div>
        </div>

    </div>
</div>

{% endblock %}
